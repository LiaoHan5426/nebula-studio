packages:
  - apps/*
  - apps/sub-web/*
  - internal/*
  - packages/*
  - packages/core/*
  - packages/ui/*
  - packages/editors/*
  - packages/features/*
  - tools/lint/*
  - tools/*
publicHoistPattern:
  - oxfmt
  - oxlint
  - stylelint
  - '*postcss*'

shamefullyHoist: true
enablePrePostScripts: true
strictPeerDependencies: false
autoInstallPeers: true
dedupePeerDependents: true
verifyDepsBeforeRun: false
ignoreWorkspaceRootCheck: true

allowBuilds:
  '@carbon/icons': true
  '@parcel/watcher': true
  electron: true
  electron-winstaller: true
  es5-ext: false
  esbuild: true
  vue-demi: true

minimumReleaseAgeExclude:
  - electron@42.3.1
overrides:
  vite: 'catalog:vite'
  vitest: 'catalog:vite'
  '@codemirror/state': ^6.7.0
  '@codemirror/view': ^6.43.2
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'

catalogMode: prefer

