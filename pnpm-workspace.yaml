packages:
  - apps/*
  - apps/sub-web/*
  - apps/electron-preload/*
  - internal/*
  - packages/*
  - tools/lint/*
  - tools/*

allowBuilds:
  '@parcel/watcher': true
  electron: true
  electron-winstaller: true
  esbuild: true
catalog:
  '@codemirror/commands': ^6.10.3
  '@codemirror/lang-html': ^6.4.11
  '@codemirror/lang-java': ^6.0.2
  '@codemirror/lang-javascript': ^6.2.5
  '@codemirror/lang-markdown': ^6.5.0
  '@codemirror/lang-python': ^6.2.1
  '@codemirror/language': ^6.12.3
  '@codemirror/state': ^6.6.0
  '@codemirror/theme-one-dark': ^6.1.3
  '@codemirror/view': ^6.42.1
  '@inquirer/prompts': ^8.4.2
  '@manypkg/get-packages': ^2.2.2
  # wangEditor：
  #   - @wangeditor/editor：核心编辑器（与 Vue/React 无关），提供数据模型、API、Slate 等。
  #   - @wangeditor/editor-for-vue：仅 Vue 组件封装层，须与 editor 5.x 配套。
  #     npm 上该包 dist-tag「latest」长期指向 1.x，对应 Vue 2，本仓库禁止解析到 1.x；Vue 3 仅允许 5.x（catalog 与 overrides 双保险）。
  '@wangeditor/editor': ^5.1.23
  '@wangeditor/editor-for-vue': ^5.1.12
  codemirror: ^6.0.2
  esno: ^4.8.0
  highlight.js: ^11.11.1
  marked: ^18.0.3
  monaco-editor: ^0.55.1
  monaco-editor-vue3: ^1.0.5
  node-sql-parser: ^5.4.0
  oxc-minify: ^0.129.0
  unconfig: ^7.5.0
  vuedraggable: ^2.24.3
  vxe-table: ^4.18.13
  xe-utils: ^4.0.7
  yaml: ^2.8.4

catalogMode: prefer

catalogs:
  build:
    esbuild: ^0.28.0
  capacitor:
    '@capacitor/cli': ^8.3.1
    '@capacitor/core': ^8.3.1
  electron:
    '@electron-toolkit/preload': ^3.0.2
    '@electron-toolkit/utils': ^4.0.0
    electron: ^41.3.0
    electron-builder: ^26.8.1
    electron-updater: ^6.8.3
    electron-vite: ^5.0.0
  lint:
    '@eslint-community/eslint-plugin-eslint-comments': ^4.7.1
    '@stylistic/stylelint-plugin': ^5.1.0
    eslint-plugin-better-tailwindcss: ^4.5.0
    eslint-plugin-command: ^3.5.2
    oxfmt: ^0.47.0
    oxlint: ^1.62.0
    stylelint: ^17.9.1
    stylelint-config-recess-order: ^7.7.0
    stylelint-config-recommended: ^18.0.0
    stylelint-config-recommended-scss: ^17.0.1
    stylelint-config-recommended-vue: ^1.6.1
    stylelint-config-standard: ^40.0.0
    stylelint-order: ^8.1.1
    stylelint-scss: ^7.0.0
  release:
    bumpp: ^11.0.1
  style:
    '@iconify/tailwind4': ^1.2.3
    '@tailwindcss/typography': ^0.5.19
    postcss: ^8.5.12
    postcss-html: ^1.8.1
    postcss-scss: ^4.0.9
    sass: ^1.99.0
    sass-embedded: ^1.99.0
    tailwindcss: ^4.3.0
    tw-animate-css: ^1.4.0
  types:
    '@types/node': ^24.12.2
    '@typescript/native-preview': 7.0.0-dev.20260328.1
    typescript: ^6.0.3
  utils:
    '@fastify/deepmerge': ^3.2.1
    '@manypkg/get-packages': ^2.2.2
    consola: ^3.4.2
    unconfig: ^7.5.0
  vite:
    '@vitejs/plugin-vue': ^6.0.6
    '@vitejs/plugin-vue-jsx': ^5.1.5
    happy-dom: ^20.9.0
    #vite: npm:@voidzero-dev/vite-plus-core@latest
    vite: 8.0.10
    vite-plus: ^0.1.21

    vitest: npm:@voidzero-dev/vite-plus-test@latest
  vue:
    vue: ^3.5.34
    vue-router: ^4.6.4
    vue-tsc: ^3.3.0
overrides:
  vite: 'catalog:vite'
  vitest: 'catalog:vite'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
