name: Deploy Demo (GitHub Pages)

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/web/**'
      - 'apps/sub-web/**'
      - 'packages/**'
      - 'tools/tailwindcss/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to GitHub Pages'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      base_path:
        description: 'Override VITE_BASE_PATH (e.g. /repo/ or /)'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-demo
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
          run-install: |
            - args: []

      - name: Resolve base path
        id: vars
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.base_path }}" ]; then
            echo "base_path=${{ github.event.inputs.base_path }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build web shell (with MSW mock)
        env:
          VITE_BASE_PATH: ${{ steps.vars.outputs.base_path }}
          NEBULA_MSW_ENABLED: 'true'
          NEBULA_MSW_BASE_PATH: ${{ steps.vars.outputs.base_path }}
        run: vp run web#build

      - name: Copy MSW Service Worker
        run: cp node_modules/msw/lib/mockServiceWorker.js apps/web/dist/mockServiceWorker.js

      - uses: actions/upload-pages-artifact@v5
        with:
          name: demo-pages
          path: apps/web/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' || github.event.inputs.deploy == 'true' }}
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v5
        with:
          artifact_name: demo-pages
