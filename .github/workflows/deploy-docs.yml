name: Deploy docs (GitHub Pages)

on:
  push:
    branches: [electron-vite, main, master]
    paths:
      - 'apps/docs/**'
      - 'packages/**'
      - 'tools/tailwindcss/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to GitHub Pages'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      base_path:
        description: 'Override VITE_BASE_PATH (e.g. /repo/ or /)'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-docs
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Resolve base path
        id: vars
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.base_path }}" ]; then
            echo "base_path=${{ github.event.inputs.base_path }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
          fi

      # 项目页：https://owner.github.io/repo/ 需带仓库名前缀；用户站点 root 仓库请改为 VITE_BASE_PATH: /
      - name: Build static site
        working-directory: apps/docs
        env:
          VITE_BASE_PATH: ${{ steps.vars.outputs.base_path }}
        run: pnpm run build:web

      - uses: actions/upload-pages-artifact@v3
        with:
          name: docs-pages
          path: apps/docs/dist-web

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' || github.event.inputs.deploy == 'true' }}
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
        with:
          artifact_name: docs-pages
